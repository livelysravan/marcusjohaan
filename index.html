<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcus Johaanilious</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Malayalam:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 44px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .image-wrap {
            position: relative;
            width: 100%;
            padding-top: 85%;
            background: #111;
            overflow: hidden;
        }

        .image-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%;
            display: block;
        }

        .image-wrap::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 100%);
            pointer-events: none;
        }

        .body {
            padding: 28px 28px 32px;
            position: relative;
            margin-top: -20px;
            background: #0d0d0d;
            border-radius: 28px 28px 0 0;
        }

        .name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.4px;
            color: #fff;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 24px;
        }

        .quote-area {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 0 10px;
        }

        .quote-text {
            font-size: 22px;
            font-weight: 330;
            line-height: 1.6;
            color: #f0f0f2;
            text-align: center;
            letter-spacing: -0.15px;
            transition: opacity 0.2s ease;
        }

        /* Malayalam font fallback */
        .quote-text.malayalam {
            font-family: "Noto Sans Malayalam", "Inter", sans-serif;
            font-weight: 400;
            font-size: 21px;
            line-height: 1.7;
        }

        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
        }

        .nav-btn {
            flex: 1;
            max-width: 150px;
            padding: 13px 10px;
            border: none;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            font-family: "Inter", sans-serif;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: all 0.15s ease;
            background: #1c1c1e;
            color: #e8e8ed;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-btn:hover {
            background: #2c2c2e;
            transform: scale(1.02);
        }

        .nav-btn:active {
            transform: scale(0.94);
            background: #141416;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none !important;
        }

        .nav-btn .icon {
            font-size: 16px;
            line-height: 1;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .card {
                border-radius: 32px;
            }

            .image-wrap {
                padding-top: 80%;
            }

            .body {
                padding: 22px 18px 24px;
                margin-top: -16px;
                border-radius: 22px 22px 0 0;
            }

            .name {
                font-size: 19px;
                margin-bottom: 18px;
            }

            .quote-text {
                font-size: 19px;
                line-height: 1.5;
            }

            .quote-text.malayalam {
                font-size: 18px;
                line-height: 1.6;
            }

            .quote-area {
                min-height: 130px;
            }

            .nav-btn {
                font-size: 13px;
                padding: 11px 8px;
                max-width: 130px;
            }
        }

        @media (max-width: 380px) {
            .body {
                padding: 16px 12px 18px;
            }

            .quote-text {
                font-size: 16px;
            }

            .quote-text.malayalam {
                font-size: 15px;
                line-height: 1.6;
            }

            .quote-area {
                min-height: 110px;
            }

            .nav-btn {
                font-size: 12px;
                padding: 10px 6px;
                max-width: 110px;
            }

            .name {
                font-size: 17px;
                margin-bottom: 14px;
            }
        }

        .fade-in {
            animation: fadeUp 0.3s ease forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        // --------------------------------------------------------------
        // SHUFFLE & MERGE — 40 English + 60 Malayalam = 100 total
        // --------------------------------------------------------------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Combine all quotes with a flag for Malayalam
        let allQuotes = [];

        englishQuotes.forEach(q => {
            allQuotes.push({ text: q, isMalayalam: false });
        });

        malayalamQuotes.forEach(q => {
            allQuotes.push({ text: q, isMalayalam: true });
        });

        // Shuffle well
        allQuotes = shuffleArray(allQuotes);

        // --------------------------------------------------------------
        // SCRIPT
        // --------------------------------------------------------------
        let currentIndex = 0;
        const quoteText = document.getElementById('quoteText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function displayQuote(index) {
            if (index < 0) index = 0;
            if (index >= allQuotes.length) index = allQuotes.length - 1;
            currentIndex = index;

            const quote = allQuotes[currentIndex];

            quoteText.classList.remove('fade-in');
            quoteText.classList.remove('malayalam');
            void quoteText.offsetWidth;

            quoteText.textContent = quote.text;

            if (quote.isMalayalam) {
                quoteText.classList.add('malayalam');
            }

            quoteText.classList.add('fade-in');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === allQuotes.length - 1;
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) displayQuote(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < allQuotes.length - 1) displayQuote(currentIndex + 1);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                prevBtn.click();
                e.preventDefault();
            } else if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                nextBtn.click();
                e.preventDefault();
            }
        });

        displayQuote(0);
    </script>

</body>
</html>
